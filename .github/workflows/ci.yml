name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Compile namespaces
        run: basilisp run scripts/compile_check.lpy
      - name: Run tests
        run: scripts/test.sh
      - name: Build wheel
        run: python -m build --wheel
      - name: Smoke installed wheel
        run: |
          python -m venv /tmp/balli-wheel-smoke
          /tmp/balli-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/balli-wheel-smoke/bin/python -m pip install dist/*.whl pytest
          /tmp/balli-wheel-smoke/bin/basilisp test tests/test_user_suite.lpy
      - name: Check whitespace
        run: git diff --check

  user-suite:
    name: Quick user suite
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run clone-friendly tests
        run: scripts/user_suite.sh
